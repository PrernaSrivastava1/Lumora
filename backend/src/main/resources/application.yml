server:
  port: 8080

spring:
  application:
    name: lumora

  datasource:
    url: ${DB_URL:jdbc:h2:file:./target/db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
    com.lumora: DEBUG

ollama:
  base-url: http://localhost:11434
  model: nomic-embed-text
  timeout-ms: 10000
  max-retries: 3
  retry-delay-ms: 1000

Lumora:
  embedding:
    active-provider: MOCK
  chunking:
    default-strategy: FIXED_SIZE
