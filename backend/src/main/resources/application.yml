server:
  port: 8081

spring:
  application:
    name: semantic-vault

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lumora}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
    com.semanticvault: DEBUG

ollama:
  base-url: http://localhost:11434
  model: nomic-embed-text
  timeout-ms: 10000
  max-retries: 3
  retry-delay-ms: 1000

semanticvault:
  embedding:
    active-provider: MOCK
  chunking:
    default-strategy: FIXED_SIZE
